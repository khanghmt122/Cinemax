<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regular Expression Checker</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
  <h2 class="mb-4">Regular Expression Checker</h2>
  
  <div class="form-group">
    <label for="regexInput">Regular Expression:</label>
    <input type="text" class="form-control" id="regexInput" placeholder="Enter regular expression:  (09|08|03)+[0-9]{8}">
  </div>
  
  <div class="form-group">
    <label for="dataInput">Data to Match:</label>
    <input type="text" class="form-control" id="dataInput" placeholder="Enter data : 0323456789" onchange="check()">
  </div>
  
  
  <div class="mt-3" id="result"></div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
  function check(){
      var regex = $("#regexInput").val();
      var data = $("#dataInput").val();
      var isValid = RegExp(regex).test(data);
      if (isValid) {
        $("#result").html("<div class='alert alert-success'>Data matches the regular expression!</div>");
      } else {
        $("#result").html("<div class='alert alert-danger'>Data does not match the regular expression!</div>");
      }
    };
</script>

</body>
</html>
