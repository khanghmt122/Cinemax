<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký khóa học - Free English Course</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <script src="../js/jquery-3.5.1.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>
    <style>
        .container {
            border: 1px solid #aaa;
        }

        header img {
            width: 100%;
        }



        .err {
            color: red;
            font-style: italic;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="row">
            <div class="col-12 p-0">
                <img src="../image/khoahoctaonline.png" alt="Banner">
            </div>
        </header>

        <!-- Menu -->
        <nav class="navbar navbar-expand-sm navbar-light bg-light">
            <a class="navbar-brand" href="#">Free English Course</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Giới thiệu</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Khóa học</a></li>
                    <li class="nav-item">
                        <button type="button" class="btn btn-danger" data-toggle="modal" data-target="#modalDK">
                            Đăng ký
                        </button>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Body: bảng danh sách -->
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Số tt</th>
                    <th>Họ tên</th>
                    <th>Ngày sinh</th>
                    <th>Điện thoại</th>
                    <th>Email</th>
                    <th>Khóa học</th>
                    <th>Hình thức học</th>
                    <th>Kỹ năng cần luyện</th>
                </tr>
            </thead>
            <tbody id="tblDK"></tbody>
        </table>

        <!-- Footer -->
        <footer class="row bg-primary text-white text-center py-2">
            <div class="col">
                <p class="mb-0">Thông tin sinh viên:</p>
                <p class="mb-0">Nguyễn Huy Khang</p>
                <p class="mb-0">22710921</p>
                <p class="mb-0">DHHTT18BTT</p>
            </div>
        </footer>
    </div>

    <!-- Modal đăng ký -->
    <div class="modal fade" id="modalDK" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">THÔNG TIN ĐĂNG KÝ</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="formDK" class="horizontal-form">
                        <div class="form-group row">
                            <label class="col-sm-3 col-form-label text-right">Họ tên</label>
                            <div class="col-sm-8">
                                <input type="text" id="txtTen" class="form-control">
                                <span id="erTen" class="err"></span>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-3 col-form-label text-right">Ngày sinh</label>
                            <div class="col-sm-8">
                                <input type="date" id="txtNS" class="form-control">
                                <span id="erNS" class="err"></span>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-3 col-form-label text-right">Số điện thoại</label>
                            <div class="col-sm-8">
                                <input type="text" id="txtDT" class="form-control" maxlength="10">
                                <span id="erDT" class="err"></span>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-3 col-form-label text-right">Email</label>
                            <div class="col-sm-8">
                                <input type="text" id="txtMail" class="form-control">
                                <span id="erMail" class="err"></span>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-3 col-form-label text-right">Chọn khóa học</label>
                            <div class="col-sm-8">
                                <select id="txtKhoa" class="form-control">
                                    <option value="Anh văn cơ bản">Anh văn cơ bản</option>
                                    <option value="Anh văn giao tiếp">Anh văn giao tiếp</option>
                                    <option value="Luyện thi IELTS">Luyện thi IELTS</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-3 col-form-label text-right">Thời gian học</label>
                            <div class="col-sm-8">
                                <input type="text" id="txtTG" class="form-control" readonly value="3 tháng">
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-3 col-form-label text-right">Hình thức học</label>
                            <div class="col-sm-8">
                                <label><input type="radio" name="ht" value="Học tại trung tâm"> Học tại trung
                                    tâm</label><br>
                                <label><input type="radio" name="ht" value="Học online"> Học online</label>
                                <span id="erHT" class="err d-block"></span>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-3 col-form-label text-right">Kỹ năng luyện tập</label>
                            <div class="col-sm-8">
                                <label><input type="checkbox" name="kn" value="Kỹ năng nghe"> Kỹ năng nghe</label><br>
                                <label><input type="checkbox" name="kn" value="Kỹ năng đọc"> Kỹ năng đọc</label><br>
                                <label><input type="checkbox" name="kn" value="Kỹ năng viết"> Kỹ năng viết</label>
                                <span id="erKN" class="err d-block"></span>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" id="btnDangKy" class="btn btn-success">Đăng ký</button>
                    <button type="button" class="btn btn-danger" data-dismiss="modal">Hủy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(function () {

            // Khóa học -> thời gian học
            $('#txtKhoa').change(function () {
                var tg = { 'Anh văn cơ bản': '3 tháng', 'Anh văn giao tiếp': '6 tháng', 'Luyện thi IELTS': '12 tháng' };
                $('#txtTG').val(tg[$(this).val()]);
            });

            function ktTen() {
                var re = /^[A-ZÀ-Ỹ][a-zà-ỹ]*(\s+[A-ZÀ-Ỹ][a-zà-ỹ]*)*$/;
                if (!re.test($('#txtTen').val().trim())) {
                    $('#erTen').text('Họ tên không được rỗng, ký tự đầu mỗi từ là chữ hoa (vd: Lê Văn An)');
                    $('#txtTen').focus();
                    return false;
                }
                $('#erTen').text('');
                return true;
            }

            function ktNS() {
                var ns = new Date($('#txtNS').val());
                if (!$('#txtNS').val() || ns >= new Date()) {
                    $('#erNS').text('Ngày sinh phải trước ngày hiện tại');
                    $('#txtNS').focus();
                    return false;
                }
                $('#erNS').text('');
                return true;
            }

            function ktDT() {
                var re = /^(09|03|08)[0-9]{8}$/;
                if (!re.test($('#txtDT').val())) {
                    $('#erDT').text('SĐT 10 số, bắt đầu bằng 09, 03 hoặc 08');
                    $('#txtDT').focus();
                    return false;
                }
                $('#erDT').text('');
                return true;
            }

            function ktMail() {
                var re = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.com$/;
                if (!re.test($('#txtMail').val())) {
                    $('#erMail').text('Email phải có @ và kết thúc bằng .com');
                    $('#txtMail').focus();
                    return false;
                }
                $('#erMail').text('');
                return true;
            }

            function ktHT() {
                if (!$('input[name="ht"]:checked').length) {
                    $('#erHT').text('Phải chọn hình thức học');
                    return false;
                }
                $('#erHT').text('');
                return true;
            }

            function ktKN() {
                if (!$('input[name="kn"]:checked').length) {
                    $('#erKN').text('Chọn ít nhất một kỹ năng');
                    return false;
                }
                $('#erKN').text('');
                return true;
            }

            $('#btnDangKy').click(function () {
                if (!ktTen() || !ktNS() || !ktDT() || !ktMail() || !ktHT() || !ktKN()) return;

                var kn = [];
                $('input[name="kn"]:checked').each(function () { kn.push($(this).val()); });

                var stt = $('#tblDK tr').length + 1;
                var row = '<tr>' +
                    '<td>' + stt + '</td>' +
                    '<td>' + $('#txtTen').val() + '</td>' +
                    '<td>' + $('#txtNS').val() + '</td>' +
                    '<td>' + $('#txtDT').val() + '</td>' +
                    '<td>' + $('#txtMail').val() + '</td>' +
                    '<td>' + $('#txtKhoa').val() + '</td>' +
                    '<td>' + $('input[name="ht"]:checked').val() + '</td>' +
                    '<td>' + kn.join(', ') + '</td>' +
                    '</tr>';

                $('#tblDK').append(row);
                $('#formDK')[0].reset();
                $('#txtTG').val('3 tháng');
                $('#modalDK').modal('hide');
            });
        });
    </script>
</body>

</html>
