<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinemaMax Admin - Giao dịch</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-wrap">
    <aside class="admin-sidebar">
      <div class="logo">
        <a href="index.html"><span class="logo-icon">🎬</span><div><span class="brand">CinemaMax</span><div class="sub">Admin Panel</div></div></a>
      </div>
      <nav class="admin-nav">
        <a href="index.html">📊 Tổng quan</a>
        <a href="movies.html">🎬 Quản lý phim</a>
        <a href="schedules.html">📅 Lịch chiếu</a>
        <a href="theaters.html">📍 Rạp chiếu</a>
        <a href="transactions.html" class="active">💳 Giao dịch</a>
        <a href="statistics.html">📈 Thống kê</a>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="../customer/index.html" class="btn btn-ghost btn-block">← Về trang chủ</a>
      </div>
    </aside>
    <main class="admin-main">
      <div class="admin-page-title" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
        <div>
          <h1>Lịch sử giao dịch</h1>
          <p>Quản lý và theo dõi các giao dịch đặt vé</p>
        </div>
        <button type="button" class="btn btn-primary">⬇ Xuất báo cáo</button>
      </div>
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem" id="tx-stats"></div>
      <div class="filters-row" style="margin-bottom:1.5rem">
        <div class="search-box" style="flex:1;max-width:28rem">
          <span class="icon">🔍</span>
          <input type="text" class="input" id="tx-search" placeholder="Tìm theo mã GD, tên KH, phim...">
        </div>
        <select class="select" id="tx-status">
          <option value="all">Tất cả trạng thái</option>
          <option value="completed">Thành công</option>
          <option value="pending">Đang xử lý</option>
          <option value="cancelled">Đã hủy</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Mã GD</th>
              <th>Khách hàng</th>
              <th>Phim</th>
              <th>Rạp</th>
              <th>Suất chiếu</th>
              <th>Ghế</th>
              <th>Số tiền</th>
              <th>PTTT</th>
              <th>Trạng thái</th>
              <th>Thời gian</th>
            </tr>
          </thead>
          <tbody id="tx-tbody"></tbody>
        </table>
        <p id="tx-empty" class="empty-state" style="display:none">Không tìm thấy giao dịch nào</p>
      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script>
    (function () {
      var search = '';
      var statusFilter = 'all';
      function getStatusBadge(s) {
        if (s === 'completed') return '<span class="badge-green">Thành công</span>';
        if (s === 'pending') return '<span class="badge-yellow">Đang xử lý</span>';
        if (s === 'cancelled') return '<span class="badge-red">Đã hủy</span>';
        return s;
      }
      function render() {
        var list = App.data.transactions.filter(function (tx) {
          var matchSearch = !search || tx.userName.toLowerCase().indexOf(search) !== -1 ||
            tx.movieTitle.toLowerCase().indexOf(search) !== -1 || tx.id.toLowerCase().indexOf(search) !== -1;
          var matchStatus = statusFilter === 'all' || tx.status === statusFilter;
          return matchSearch && matchStatus;
        });
        var completed = list.filter(function (tx) { return tx.status === 'completed'; });
        var pending = list.filter(function (tx) { return tx.status === 'pending'; });
        var totalRev = completed.reduce(function (sum, tx) { return sum + tx.totalAmount; }, 0);
        document.getElementById('tx-stats').innerHTML =
          '<div class="stat-card"><div class="label">Tổng giao dịch</div><div class="value">' + list.length + '</div></div>' +
          '<div class="stat-card"><div class="label">Thành công</div><div class="value" style="color:#22c55e">' + completed.length + '</div></div>' +
          '<div class="stat-card"><div class="label">Đang xử lý</div><div class="value" style="color:#eab308">' + pending.length + '</div></div>' +
          '<div class="stat-card"><div class="label">Tổng doanh thu</div><div class="value">' + App.formatPrice(totalRev) + '</div></div>';
        document.getElementById('tx-tbody').innerHTML = list.map(function (tx) {
          return '<tr>' +
            '<td><span style="font-family:monospace;font-size:0.875rem">' + tx.id + '</span></td>' +
            '<td>' + tx.userName + '</td>' +
            '<td>' + tx.movieTitle + '</td>' +
            '<td>' + tx.theaterName + '</td>' +
            '<td>' + tx.showtime + '</td>' +
            '<td>' + (tx.seats && tx.seats.join(', ')) + '</td>' +
            '<td><span style="font-weight:600">' + App.formatPrice(tx.totalAmount) + '</span></td>' +
            '<td>' + tx.paymentMethod + '</td>' +
            '<td>' + getStatusBadge(tx.status) + '</td>' +
            '<td style="font-size:0.875rem">' + new Date(tx.createdAt).toLocaleString('vi-VN') + '</td>' +
          '</tr>';
        }).join('');
        document.getElementById('tx-empty').style.display = list.length ? 'none' : 'block';
      }
      App.fetchData().then(function () {
        render();
        document.getElementById('tx-search').oninput = function () { search = this.value.trim(); render(); };
        document.getElementById('tx-status').onchange = function () { statusFilter = this.value; render(); };
      });
    })();
  </script>
</body>
</html>
