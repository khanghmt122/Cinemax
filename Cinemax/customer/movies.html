<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinemaMax - Danh sách phim</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page">
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🎬</span>
        <span>CinemaMax</span>
      </a>
      <nav class="nav" id="customer-header-nav"></nav>
      <div class="header-actions">
        <div class="search-wrap">
          <input type="text" placeholder="Tìm phim..." id="search-input" aria-label="Tìm phim">
        </div>
        <a href="login.html" class="btn btn-ghost btn-icon" aria-label="Đăng nhập">👤</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="section">
        <h1 style="font-size:2.25rem;color:#fff;margin:0 0 0.25rem">Danh sách phim</h1>
        <p style="color:rgba(255,255,255,0.5);margin:0 0 1rem">Khám phá các bộ phim mới nhất và sắp ra mắt</p>
        <div class="search-box" style="margin-bottom:1.5rem">
          <span class="icon">🔍</span>
          <input type="text" class="input" id="movies-search" placeholder="Tìm kiếm phim..." style="max-width:28rem">
        </div>
        <div class="tabs">
          <div class="tabs-list full">
            <button type="button" class="tab-trigger active" data-tab="now-showing">Đang chiếu (<span id="count-now">0</span>)</button>
            <button type="button" class="tab-trigger" data-tab="coming-soon">Sắp chiếu (<span id="count-soon">0</span>)</button>
          </div>
          <div id="tab-now-showing" class="tab-panel active">
            <div class="movie-grid" id="grid-now"></div>
            <p id="empty-now" class="empty-state" style="display:none">Không tìm thấy phim nào</p>
          </div>
          <div id="tab-coming-soon" class="tab-panel">
            <div class="movie-grid" id="grid-soon"></div>
            <p id="empty-soon" class="empty-state" style="display:none">Không tìm thấy phim nào</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p id="footer-text"></p></div>
  </footer>

  <script src="../js/app.js"></script>
  <script>
    (function () {
      var search = '';
      function filterMovies(list) {
        if (!search) return list;
        var q = search.toLowerCase();
        return list.filter(function (m) {
          return (m.titleVi && m.titleVi.toLowerCase().indexOf(q) !== -1) ||
                 (m.title && m.title.toLowerCase().indexOf(q) !== -1) ||
                 (m.genre && m.genre.some(function (g) { return g.toLowerCase().indexOf(q) !== -1; }));
        });
      }
      function render() {
        var movies = App.data.movies;
        var now = movies.filter(function (m) { return m.status === 'now-showing'; });
        var soon = movies.filter(function (m) { return m.status === 'coming-soon'; });
        var nowFiltered = filterMovies(now);
        var soonFiltered = filterMovies(soon);
        document.getElementById('count-now').textContent = now.length;
        document.getElementById('count-soon').textContent = soon.length;
        document.getElementById('grid-now').innerHTML = nowFiltered.map(App.renderMovieCard).join('');
        document.getElementById('grid-soon').innerHTML = soonFiltered.map(App.renderMovieCard).join('');
        document.getElementById('empty-now').style.display = nowFiltered.length ? 'none' : 'block';
        document.getElementById('empty-soon').style.display = soonFiltered.length ? 'none' : 'block';
      }
      App.fetchData().then(function () {
        App.renderHeader('movies');
        App.renderFooter();
        render();
        document.getElementById('movies-search').oninput = function () {
          search = this.value.trim();
          render();
        };
        document.querySelectorAll('.tab-trigger').forEach(function (btn) {
          btn.onclick = function () {
            document.querySelectorAll('.tab-trigger').forEach(function (b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
            btn.classList.add('active');
            var tab = btn.getAttribute('data-tab');
            document.getElementById('tab-' + tab).classList.add('active');
          };
        });
      });
    })();
  </script>
</body>
</html>
